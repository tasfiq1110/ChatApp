<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hello Chat — Admin</title>
<style>
:root{
  --bg:#0d0d14;--s1:#13131e;--s2:#1a1a2a;--s3:#22223a;
  --bd:rgba(255,255,255,.08);--ac:#7c6aff;--ac2:#ff6a9f;--ac3:#6affda;
  --tx:#f0eeff;--mu:rgba(240,238,255,.5);
  --red:#ff4d6d;--grn:#6affda;--ylw:#ffb347;--blue:#4d9fff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}

/* Login */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:40px;width:360px;text-align:center;}
.login-logo{font-size:2rem;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.login-box p{color:var(--mu);font-size:.875rem;margin-bottom:28px;}
.login-box input{width:100%;padding:12px 16px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:.95rem;outline:none;margin-bottom:12px;}
.login-box input:focus{border-color:var(--ac);}
.login-box button{width:100%;padding:13px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;}
.login-err{color:var(--red);font-size:.82rem;margin-top:10px;min-height:18px;}

/* App */
#adminApp{display:none;}
.topbar{display:flex;align-items:center;padding:12px 20px;background:var(--s1);border-bottom:1px solid var(--bd);gap:12px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-size:1.1rem;font-weight:700;flex:1;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.live-badge{padding:3px 10px;border-radius:100px;background:rgba(106,255,218,.1);border:1px solid rgba(106,255,218,.2);color:var(--ac3);font-size:.72rem;}
.topbtn{padding:6px 14px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;font-size:.78rem;}
.topbtn:hover{border-color:var(--ac);color:var(--ac);}
.topbtn.danger:hover{border-color:var(--red);color:var(--red);}

.layout{display:flex;min-height:calc(100vh - 49px);}
.sidebar{width:190px;background:var(--s1);border-right:1px solid var(--bd);padding:12px 0;flex-shrink:0;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;}
.nav{display:flex;align-items:center;gap:9px;padding:10px 18px;cursor:pointer;font-size:.84rem;color:var(--mu);transition:all .12s;-webkit-tap-highlight-color:transparent;}
.nav:hover{background:var(--s2);color:var(--tx);}
.nav.on{background:rgba(124,106,255,.12);color:var(--ac);border-right:2px solid var(--ac);}
.nav-ic{font-size:1rem;width:18px;text-align:center;}
.nav-badge{margin-left:auto;padding:1px 6px;border-radius:100px;background:var(--red);color:#fff;font-size:.62rem;font-weight:700;}

.content{flex:1;padding:22px;overflow-y:auto;}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:22px;}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:16px;}
.card-lbl{font-size:.68rem;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
.card-val{font-size:1.7rem;font-weight:700;}
.cv-g{color:var(--grn);}
.cv-b{color:var(--blue);}
.cv-y{color:var(--ylw);}
.cv-r{color:var(--red);}
.cv-p{color:var(--ac);}
.card-sub{font-size:.68rem;color:var(--mu);margin-top:3px;}

/* Section heading */
.sh{font-size:.78rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}

/* Table */
.tbl-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:13px;overflow:auto;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;min-width:500px;}
th{text-align:left;padding:10px 13px;font-size:.68rem;font-weight:600;color:var(--mu);text-transform:uppercase;border-bottom:1px solid var(--bd);background:var(--s2);white-space:nowrap;}
td{padding:9px 13px;font-size:.82rem;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:100px;font-size:.68rem;font-weight:500;}
.pill-g{background:rgba(106,255,218,.1);border:1px solid rgba(106,255,218,.2);color:var(--grn);}
.pill-r{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.2);color:var(--red);}
.pill-y{background:rgba(255,179,71,.1);border:1px solid rgba(255,179,71,.2);color:var(--ylw);}
.pill-m{background:rgba(255,255,255,.05);border:1px solid var(--bd);color:var(--mu);}

/* Buttons */
.btn{padding:5px 11px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;font-size:.72rem;white-space:nowrap;}
.btn:hover{border-color:var(--ac);color:var(--ac);}
.btn.r:hover{border-color:var(--red);color:var(--red);}
.btn.y:hover{border-color:var(--ylw);color:var(--ylw);}
.btn.g:hover{border-color:var(--grn);color:var(--grn);}
.btn-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}

/* Input */
.inp{padding:8px 13px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);font-size:.85rem;outline:none;}
.inp:focus{border-color:var(--ac);}

/* Media grid */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.mcard{background:var(--s1);border:1px solid var(--bd);border-radius:11px;overflow:hidden;position:relative;}
.mcard.flagged{border-color:rgba(255,77,109,.4);}
.mcard img{width:100%;height:100px;object-fit:cover;display:block;cursor:zoom-in;}
.mcard video{width:100%;height:100px;object-fit:cover;display:block;}
.mcard-info{padding:6px 9px;}
.mcard-name{font-size:.65rem;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mcard-meta{font-size:.62rem;color:var(--mu);opacity:.6;margin-top:1px;}
.mcard-del{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:50%;background:rgba(255,77,109,.85);border:none;color:#fff;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;}
.mcard-del:hover{background:var(--red);}
.mcard-flag{position:absolute;top:5px;left:5px;padding:2px 6px;border-radius:4px;background:rgba(255,77,109,.9);color:#fff;font-size:.6rem;font-weight:700;}
.video-ph{width:100%;height:100px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:1.8rem;}

/* Chart */
.chart-box{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:18px;margin-bottom:20px;}
.bars{display:flex;align-items:flex-end;gap:3px;height:110px;margin-top:10px;}
.bar-c{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar-f{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s;}
.bar-l{font-size:.55rem;color:var(--mu);white-space:nowrap;}

/* Broadcast */
.bc-box{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:18px;margin-bottom:20px;}
.bc-box textarea{width:100%;padding:9px 13px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:.875rem;resize:vertical;min-height:80px;outline:none;margin-bottom:10px;}
.bc-box textarea:focus{border-color:var(--ac);}
.bc-send{padding:9px 22px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:8px;color:#fff;font-size:.875rem;font-weight:600;cursor:pointer;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:9px 16px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;font-size:.82rem;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.on{opacity:1;}
.toast.ok{border-color:var(--grn);color:var(--grn);}
.toast.err{border-color:var(--red);color:var(--red);}

.empty{text-align:center;padding:36px;color:var(--mu);font-size:.85rem;}
.mono{font-family:monospace;font-size:.78rem;}

@media(max-width:680px){
  .sidebar{display:none;}
  .cards{grid-template-columns:repeat(2,1fr);}
  .content{padding:14px;}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">⚡ Hello Admin</div>
    <p>Enter your admin password</p>
    <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">Login →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="adminApp">
  <div class="topbar">
    <div class="topbar-logo">⚡ Hello Admin</div>
    <span class="live-badge" id="liveBadge">● Live</span>
    <button class="topbtn" onclick="loadAll()">↻ Refresh</button>
    <button class="topbtn danger" onclick="doLogout()">Logout</button>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="nav on" onclick="go('overview')" id="n-overview"><span class="nav-ic">📊</span>Overview</div>
      <div class="nav" onclick="go('users')" id="n-users"><span class="nav-ic">👥</span>Users</div>
      <div class="nav" onclick="go('media')" id="n-media"><span class="nav-ic">🖼️</span>All Media</div>
      <div class="nav" onclick="go('badwords')" id="n-badwords"><span class="nav-ic">🤬</span>Bad Words<span class="nav-badge" id="bwBadge">0</span></div>
      <div class="nav" onclick="go('nudity')" id="n-nudity"><span class="nav-ic">🔞</span>Nudity<span class="nav-badge" id="nudBadge">0</span></div>
      <div class="nav" onclick="go('wordlist')" id="n-wordlist"><span class="nav-ic">📝</span>Word Lists</div>
      <div class="nav" onclick="go('words')" id="n-words"><span class="nav-ic">📝</span>Word Lists</div>
      <div class="nav" onclick="go('ipbans')" id="n-ipbans"><span class="nav-ic">🔒</span>IP Bans</div>
      <div class="nav" onclick="go('banned')" id="n-banned"><span class="nav-ic">🚫</span>Banned Users</div>
      <div class="nav" onclick="go('broadcast')" id="n-broadcast"><span class="nav-ic">📢</span>Broadcast</div>
      <div class="nav" onclick="go('analytics')" id="n-analytics"><span class="nav-ic">📈</span>Analytics</div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const G = id => document.getElementById(id);
let TOKEN = localStorage.getItem('zapp_adm') || '';
let tab = 'overview';
let autoRef = null;
let D = { stats:{}, sessions:[], media:[], violations:[], bannedIPs:[], words:{} };

// ── Auth ──────────────────────────────────────────────
async function doLogin() {
  const pw = G('pw').value;
  G('loginErr').textContent = '';
  try {
    const r = await fetch('/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw}) });
    const d = await r.json();
    if (d.token) {
      TOKEN = d.token; localStorage.setItem('zapp_adm', TOKEN);
      G('loginScreen').style.display = 'none';
      G('adminApp').style.display = 'block';
      await loadAll();
      autoRef = setInterval(loadAll, 30000);
    } else G('loginErr').textContent = 'Wrong password';
  } catch { G('loginErr').textContent = 'Connection failed'; }
}
function doLogout() {
  TOKEN = ''; localStorage.removeItem('zapp_adm');
  clearInterval(autoRef);
  G('adminApp').style.display = 'none';
  G('loginScreen').style.display = 'flex';
}
if (TOKEN) {
  G('loginScreen').style.display = 'none';
  G('adminApp').style.display = 'block';
  loadAll().catch(() => doLogout());
  autoRef = setInterval(loadAll, 30000);
}

// ── API ───────────────────────────────────────────────
async function api(method, url, body) {
  try {
    const r = await fetch(url, { method, headers:{'x-admin-token':TOKEN,'Content-Type':'application/json'}, body: body ? JSON.stringify(body) : undefined });
    if (r.status === 401) { doLogout(); return null; }
    return r.json();
  } catch { return null; }
}

// ── Load ──────────────────────────────────────────────
async function loadAll() {
  const [s, sess, media, viol, ips, words] = await Promise.all([
    api('GET','/admin/api/stats'),
    api('GET','/admin/api/sessions'),
    api('GET','/admin/api/media'),
    api('GET','/admin/api/violations'),
    api('GET','/admin/api/banned-ips'),
    api('GET','/admin/api/words')
  ]);
  if (!s) return;
  D.stats=s; D.sessions=sess||[]; D.media=media||[];
  D.violations=viol||[]; D.bannedIPs=ips||[];
  // Always refresh word lists
  api('GET','/admin/api/words').then(w=>{ if(w){D.words=w; if(tab==='words')render();} }); D.words=words||{};
  G('liveBadge').textContent = `● ${s.online||0} online`;
  const bw = D.violations.filter(v=>v.type==='badword').length;
  const nu = D.violations.filter(v=>v.type==='nudity').length;
  G('bwBadge').textContent = bw; G('bwBadge').style.display = bw?'':'none';
  G('nudBadge').textContent = nu; G('nudBadge').style.display = nu?'':'none';
  render();
}

// ── Navigation ────────────────────────────────────────
function go(t) {
  tab = t;
  document.querySelectorAll('.nav').forEach(n => n.classList.remove('on'));
  G('n-'+t)?.classList.add('on');
  render();
}
function render() {
  const c = G('content');
  const fns = { overview, users, media, badwords, nudity, words, wordlist, ipbans, banned, broadcast, analytics };
  if (fns[tab]) c.innerHTML = fns[tab]();
}

// ── OVERVIEW ──────────────────────────────────────────
function overview() {
  const s = D.stats;
  const mediaSize = (s.mediaFiles||[]).reduce((a,f)=>a+f.size,0);
  return `
  <div class="cards">
    <div class="card"><div class="card-lbl">Online</div><div class="card-val cv-g">${s.online||0}</div><div class="card-sub">Connected now</div></div>
    <div class="card"><div class="card-lbl">Active Chats</div><div class="card-val cv-b">${s.activePairs||0}</div><div class="card-sub">Paired users</div></div>
    <div class="card"><div class="card-lbl">Searching</div><div class="card-val cv-y">${s.waiting||0}</div><div class="card-sub">In queue</div></div>
    <div class="card"><div class="card-lbl">Today's DAU</div><div class="card-val cv-p">${s.todayDAU||0}</div><div class="card-sub">Daily active</div></div>
    <div class="card"><div class="card-lbl">Total Chats</div><div class="card-val cv-b">${(s.totalChats||0).toLocaleString()}</div><div class="card-sub">All time</div></div>
    <div class="card"><div class="card-lbl">Total Messages</div><div class="card-val cv-p">${(s.totalMessages||0).toLocaleString()}</div><div class="card-sub">All time</div></div>
    <div class="card"><div class="card-lbl">Total Users</div><div class="card-val cv-b">${(s.totalUsers||0).toLocaleString()}</div><div class="card-sub">All time</div></div>
    <div class="card"><div class="card-lbl">Banned Sessions</div><div class="card-val cv-r">${s.bannedCount||0}</div><div class="card-sub">Blacklisted</div></div>
    <div class="card"><div class="card-lbl">Banned IPs</div><div class="card-val cv-r">${s.bannedIPCount||0}</div><div class="card-sub">Permanent blocks</div></div>
    <div class="card"><div class="card-lbl">Violations</div><div class="card-val cv-y">${s.violationCount||0}</div><div class="card-sub">Bad words + nudity</div></div>
    <div class="card"><div class="card-lbl">Media Files</div><div class="card-val cv-y">${(s.mediaFiles||[]).length}</div><div class="card-sub">${fmtB(mediaSize)}</div></div>
    <div class="card"><div class="card-lbl">Next Cleanup</div><div class="card-val" style="font-size:1rem;margin-top:4px">${nextMidnight()}</div><div class="card-sub">Auto-delete media</div></div>
  </div>
  <div class="sh">Recent uploads (last 6)</div>
  <div class="mgrid">
    ${(s.mediaFiles||[]).slice(0,6).map(f => mediaCard(f)).join('') || '<div class="empty">No media</div>'}
  </div>`;
}

// ── USERS ─────────────────────────────────────────────
function users() {
  return `
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    <input class="inp" id="uSearch" placeholder="Search name / country…" oninput="filterU()" style="flex:1;min-width:180px;max-width:300px"/>
    <span style="font-size:.78rem;color:var(--mu)">${D.sessions.length} sessions</span>
  </div>
  <div class="tbl-wrap" id="uTbl">${userTbl(D.sessions)}</div>`;
}
function userTbl(list) {
  if (!list.length) return '<div class="empty">No sessions</div>';
  return `<table>
    <tr><th>Name</th><th>Country</th><th>IP</th><th>Status</th><th>Warns</th><th>Msgs</th><th>Actions</th></tr>
    ${list.map(u=>`<tr>
      <td>${u.flag||''} <b>${e(u.name)}</b></td>
      <td>${e(u.country||'—')}</td>
      <td class="mono">${e(u.ip||'—')}</td>
      <td>${u.inChat?`<span class="pill pill-g">💬 Chat</span>`:u.online?`<span class="pill pill-y">🟡 Online</span>`:`<span class="pill pill-m">Off</span>`}</td>
      <td>${u.warnings>0?`<span style="color:var(--ylw)">${u.warnings}/3</span>`:'0'}</td>
      <td>${u.msgCount||0}</td>
      <td><div class="btn-row">
        ${u.inChat?`<button class="btn" onclick="viewChat('${u.sessId}')">👁 View</button>`:''}
        <button class="btn y" onclick="kickUser('${u.sessId}')">⚡ Kick</button>
        <button class="btn r" onclick="banSess('${u.sessId}','${e(u.name)}')">🚫 Ban</button>
        ${u.ip?`<button class="btn r" onclick="banIPdo('${e(u.ip)}')">🔒 Ban IP</button>`:''}
      </div></td>
    </tr>`).join('')}
  </table>`;
}
function filterU() {
  const q = G('uSearch')?.value.toLowerCase()||'';
  const f = q ? D.sessions.filter(u=>(u.name+u.country+u.ip).toLowerCase().includes(q)) : D.sessions;
  G('uTbl').innerHTML = userTbl(f);
}

// ── ALL MEDIA ─────────────────────────────────────────
function media() {
  const total = D.media.reduce((a,f)=>a+f.size,0);
  return `
  <div class="sh">
    <span>All Media — ${D.media.length} files, ${fmtB(total)} — auto-deleted at midnight</span>
    <div class="btn-row">
      <button class="btn r" onclick="delAllMedia()">🗑 Delete All</button>
    </div>
  </div>
  <div class="mgrid">
    ${D.media.map(f => mediaCard(f)).join('') || '<div class="empty" style="grid-column:1/-1">No media files ✓</div>'}
  </div>`;
}

function mediaCard(f) {
  const isImg = f.isImage || ['.jpg','.jpeg','.png','.gif','.webp'].some(x=>f.filename.toLowerCase().endsWith(x));
  const fn = f.filename.replace(/'/g,'&#39;');
  return `<div class="mcard ${f.flagged?'flagged':''}">
    ${f.flagged?`<div class="mcard-flag">${f.violationType==='nudity'?'🔞':'🤬'}</div>`:''}
    ${isImg
      ? `<img src="/uploads/${fn}" loading="lazy" onclick="window.open('/uploads/${fn}','_blank')">`
      : `<div class="video-ph">🎬</div>`}
    <div class="mcard-info">
      <div class="mcard-name">${e(f.filename)}</div>
      <div class="mcard-meta">${fmtB(f.size)} · ${ago(f.created)}</div>
    </div>
    <button class="mcard-del" onclick="delMedia('${fn}')" title="Delete">✕</button>
  </div>`;
}

// ── BAD WORDS LOG ─────────────────────────────────────
function badwords() {
  const list = D.violations.filter(v=>v.type==='badword');
  // Group by IP
  const byIP = {};
  list.forEach(v => {
    if (!byIP[v.ip]) byIP[v.ip] = { ip:v.ip, name:v.name, flag:v.flag, country:v.country, sessId:v.sessId, count:0, items:[] };
    byIP[v.ip].count++;
    byIP[v.ip].items.push(v);
  });
  const groups = Object.values(byIP).sort((a,b)=>b.count-a.count);

  return `
  <div class="sh">
    <span>🤬 Bad Word Violations — ${list.length} total from ${groups.length} IPs</span>
    <button class="btn r" onclick="clearViol('badword')">🗑 Clear All</button>
  </div>
  ${!groups.length ? '<div class="empty">No bad word violations ✓</div>' :
  groups.map(g=>`
    <div class="tbl-wrap" style="margin-bottom:14px">
      <div style="padding:10px 13px;background:var(--s2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--bd)">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="mono">${e(g.ip||'unknown IP')}</span>
          <span>${g.flag||''} ${e(g.name)}</span>
          <span style="font-size:.72rem;color:var(--mu)">${e(g.country||'')}</span>
          <span class="pill pill-y">${g.count} violation${g.count>1?'s':''}</span>
          ${bannedIPBadge(g.ip)}

            ? `<button class="btn g" onclick="unbanIPdo('${e(g.ip)}')">✓ Unban IP</button>`

          ${g.sessId?`<button class="btn r" onclick="banSess('${g.sessId}','${e(g.name)}')">🚫 Ban User</button>`:''}

// ── NUDITY LOG ────────────────────────────────────────
function nudity() {
  const list = D.violations.filter(v=>v.type==='nudity');
  const byIP = {};
  list.forEach(v => {
    if (!byIP[v.ip]) byIP[v.ip] = { ip:v.ip, name:v.name, flag:v.flag, country:v.country, sessId:v.sessId, count:0, items:[] };
    byIP[v.ip].count++;
    byIP[v.ip].items.push(v);
  });
  const groups = Object.values(byIP).sort((a,b)=>b.count-a.count);

  return `
  <div class="sh">
    <span>🔞 Nudity Attempts — ${list.length} total from ${groups.length} IPs</span>
    <button class="btn r" onclick="clearViol('nudity')">🗑 Clear All</button>
  </div>
  ${!groups.length ? '<div class="empty">No nudity violations ✓</div>' :
  groups.map(g=>`
    <div class="tbl-wrap" style="margin-bottom:14px">
      <div style="padding:10px 13px;background:var(--s2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--bd)">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="mono">${e(g.ip||'unknown IP')}</span>
          <span>${g.flag||''} ${e(g.name)}</span>
          <span style="font-size:.72rem;color:var(--mu)">${e(g.country||'')}</span>
          <span class="pill pill-r">${g.count} attempt${g.count>1?'s':''}</span>
          ${bannedIPBadge(g.ip)}
        </div>
        <div class="btn-row">
          ${bannedIPs().includes(g.ip)
            ? `<button class="btn g" onclick="unbanIPdo('${e(g.ip)}')">✓ Unban IP</button>`
            : `<button class="btn r" onclick="banIPdo('${e(g.ip)}')">🔒 Ban IP</button>`}
          ${g.sessId?`<button class="btn r" onclick="banSess('${g.sessId}','${e(g.name)}')">🚫 Ban User</button>`:''}
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;padding:10px 13px">
        ${g.items.map(v=>v.url?`
          <div style="position:relative">
            <img src="${v.url}" style="height:80px;width:80px;object-fit:cover;border-radius:7px;border:2px solid var(--red);cursor:zoom-in" onclick="window.open('${v.url}','_blank')" title="${e(v.filename)}">
            <div style="font-size:.58rem;color:var(--mu);text-align:center;margin-top:2px">${new Date(v.ts).toLocaleDateString()}</div>
          </div>`:'').join('')}
        ${g.items.filter(v=>v.url).length===0?'<span style="color:var(--mu);font-size:.8rem">No preview available</span>':''}
      </div>
    </div>`).join('')}`;
}

// ── ANALYTICS ─────────────────────────────────────────
function analytics() {
  const daily = D.stats.dailyStats || {};
  const days = Object.keys(daily).sort().slice(-14);
  const maxU = Math.max(1, ...days.map(d=>daily[d].users||0));
  const maxC = Math.max(1, ...days.map(d=>daily[d].chats||0));
  return `
  <div class="chart-box">
    <div class="sh">Daily Active Users</div>
    <div class="bars">${days.map(d=>{
      const h=Math.max(2,((daily[d].users||0)/maxU)*100);
      return`<div class="bar-c"><div class="bar-f" style="height:${h}%;background:linear-gradient(180deg,var(--ac),rgba(124,106,255,.2))" title="${d}: ${daily[d].users||0}"></div><div class="bar-l">${d.slice(5)}</div></div>`;
    }).join('')||'<div class="empty">No data yet</div>'}</div>
  </div>
  <div class="chart-box">
    <div class="sh">Daily Chats Started</div>
    <div class="bars">${days.map(d=>{
      const h=Math.max(2,((daily[d].chats||0)/maxC)*100);
      return`<div class="bar-c"><div class="bar-f" style="height:${h}%;background:linear-gradient(180deg,var(--ac2),rgba(255,106,159,.2))" title="${d}: ${daily[d].chats||0}"></div><div class="bar-l">${d.slice(5)}</div></div>`;
    }).join('')||'<div class="empty">No data yet</div>'}</div>
  </div>
  <div class="tbl-wrap">
    <table>
      <tr><th>Date</th><th>Users</th><th>Chats</th><th>Messages</th></tr>
      ${[...days].reverse().map(d=>`<tr>
        <td>${d}</td><td>${daily[d].users||0}</td><td>${daily[d].chats||0}</td><td>${daily[d].messages||0}</td>
      </tr>`).join('')||'<tr><td colspan="4" class="empty">No data</td></tr>'}
    </table>
  </div>`;
}

// ── ACTIONS ───────────────────────────────────────────
async function viewChat(sessId) {
  const d = await api('GET', `/admin/api/chat/${sessId}`);
  if (!d) return;
  const w = window.open('','_blank','width=600,height=700');
  const msgs = d.messages||[];
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Chat</title>
  <style>body{font-family:sans-serif;background:#0d0d14;color:#f0eeff;padding:20px;margin:0}
  h2{margin-bottom:4px;font-size:1rem}p{font-size:.78rem;color:#888;margin-bottom:16px}
  .m{margin:7px 0;padding:8px 11px;border-radius:8px;font-size:.82rem}
  .me{background:rgba(124,106,255,.18);margin-left:15%}
  .them{background:#1a1a2a;margin-right:15%}
  .nm{font-size:.65rem;color:#888;margin-bottom:2px}
  .tx{line-height:1.4;word-break:break-word}
  img{max-width:180px;border-radius:6px;margin-top:4px;display:block}
  .tm{font-size:.6rem;color:#555;margin-top:3px;text-align:right}
  .ip{font-size:.7rem;color:#555;font-family:monospace}</style></head><body>
  <h2>💬 ${e(d.session?.name||'?')} ↔ ${e(d.partner?.name||'?')}</h2>
  <p class="ip">IP: ${e(d.session?.ip||'?')} · ${msgs.length} messages · ${e(d.session?.country||'')}</p>
  ${msgs.map(m=>`<div class="m ${m.fromName===d.session?.name?'me':'them'}">
    <div class="nm">${e(m.fromName||'?')}</div>
    <div class="tx">${m.unsent?'<i style="opacity:.4">🗑️ Unsent</i>':m.type==='image'?`<img src="${m.url||''}">`
      :m.type==='gif'?`<img src="${m.gif||''}">`
      :e(m.text||'[media]')}</div>
    <div class="tm">${new Date(m.timestamp).toLocaleTimeString()}</div>
  </div>`).join('')||'<p>No messages</p>'}
  </body></html>`);
}

async function kickUser(id) {
  if(!confirm('Kick this user?')) return;
  await api('POST',`/admin/api/kick/${id}`);
  toast('User kicked','ok'); loadAll();
}
async function banSess(id, name) {
  if(!confirm(`Ban ${name}?`)) return;
  await api('POST',`/admin/api/ban/${id}`);
  toast(`${name} banned`,'ok'); loadAll();
}
async function unbanSess(id, name) {
  await api('POST',`/admin/api/unban/${id}`);
  toast(`${name} unbanned`,'ok'); loadAll();
}
async function banIPdo(ip) {
  if(!confirm(`Permanently ban IP ${ip}?`)) return;
  const r = await api('POST','/admin/api/ban-ip',{ip});
  toast(`IP ${ip} banned — ${r?.kicked||0} kicked`,'ok'); loadAll();
}
async function unbanIPdo(ip) {
  await api('POST','/admin/api/unban-ip',{ip});
  toast(`IP ${ip} unbanned`,'ok'); loadAll();
}
async function banIPManual() {
  const ip = G('newIP')?.value.trim();
  if (!ip) { toast('Enter an IP address','err'); return; }
  if (!confirm(`Permanently ban IP ${ip}?`)) return;
  const r = await api('POST','/admin/api/ban-ip',{ip});
  toast(`IP ${ip} banned`,'ok'); G('newIP').value=''; loadAll();
}
async function delMedia(fn) {
  if(!confirm(`Delete ${fn}?`)) return;
  await api('DELETE',`/admin/api/media/${fn}`);
  toast('Deleted','ok'); D.media = D.media.filter(f=>f.filename!==fn); render();
}
async function delAllMedia() {
  if(!confirm(`Delete ALL ${D.media.length} media files? Cannot be undone.`)) return;
  const r = await api('DELETE','/admin/api/media');
  toast(`Deleted ${r?.deleted||0} files`,'ok'); D.media=[]; render();
}
async function sendBC() {
  const msg = G('bcMsg')?.value.trim();
  if (!msg) return;
  const r = await api('POST','/admin/api/broadcast',{message:msg});
  toast(`Sent to ${r?.sent||0} users`,'ok'); G('bcMsg').value='';
}
async function addWord(type) {
  const inp = G(type==='bad'?'newBadWord':'newNudityWord');
  const word = inp?.value.trim().toLowerCase();
  if (!word) { toast('Enter a word','err'); return; }
  const r = await api('POST', `/admin/api/words/${type}`, {word});
  if (r?.ok) { toast(`"${word}" added`,'ok'); inp.value=''; await loadAll(); }
  else toast('Failed','err');
}
async function removeWord(type, word) {
  const r = await api('DELETE', `/admin/api/words/${type}/${encodeURIComponent(word)}`);
  if (r?.ok) { toast(`"${word}" removed`,'ok'); await loadAll(); }
  else toast('Failed','err');
}

async function addWord(type) {
  const id = type==='bad' ? 'newBadWord' : 'newNudityWord';
  const word = G(id)?.value.trim().toLowerCase();
  if (!word) { toast('Enter a word first','err'); return; }
  const r = await api('POST', `/admin/api/words/${type}`, { word });
  if (!r) return;
  if (!D.words) D.words = { builtinBad:[], customBad:[], builtinNudity:[], customNudity:[] };
  if (type==='bad') D.words.customBad = r.customBad||[];
  else D.words.customNudity = r.customNudity||[];
  toast(`"${word}" added to ${type==='bad'?'bad words':'nudity keywords'}`,'ok');
  G(id).value='';
  render();
}

async function removeWord(type, word) {
  const r = await api('DELETE', `/admin/api/words/${type}/${encodeURIComponent(word)}`);
  if (!r) return;
  if (!D.words) D.words = { builtinBad:[], customBad:[], builtinNudity:[], customNudity:[] };
  if (type==='bad') D.words.customBad = r.customBad||[];
  else D.words.customNudity = r.customNudity||[];
  toast(`"${word}" removed`,'ok');
  render();
}

async function clearViol(type) {
  if(!confirm(`Clear all ${type} violation records?`)) return;
  // Clear just this type from front-end; server clears all (filter client-side)
  await api('DELETE','/admin/api/violations');
  D.violations=[]; toast('Cleared','ok'); render();
}

// ── HELPERS ───────────────────────────────────────────
function bannedIPs() { return D.bannedIPs; }
function bannedIPBadge(ip) {
  return D.bannedIPs.includes(ip) ? `<span class="pill pill-r">🔒 IP Banned</span>` : '';
}
function nextMidnight() {
  const n = new Date(); const m = new Date(n); m.setHours(24,0,0,0);
  const diff = m - n;
  const h = Math.floor(diff/3600000), mi = Math.floor((diff%3600000)/60000);
  return `${h}h ${mi}m`;
}
function fmtB(b) {
  if(!b||b<1024) return (b||0)+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}
function ago(d) {
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60) return s+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function e(t) { return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let toastT=null;
function toast(msg,type='') {
  const t=G('toast'); t.textContent=msg;
  t.className='toast'+(type?' '+type:''); t.classList.add('on');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),3000);
}
